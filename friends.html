<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friends · AniVerse</title>
    <!-- Google Fonts, Font Awesome, etc. (same as original) -->
    <!-- ... [all the <head> content from original friends.html] ... -->
    <!-- Replace script src to use supabaseClient.js -->
    <script src="supabaseClient.js"></script>
    <style>
        /* ... existing styles ... */
        /* Additional style for modal, but keep original layout */
    </style>
</head>
<body>

    <!-- Sidebar same as original but ensure all nav links point to correct pages -->
    <!-- ... [sidebar HTML] ... -->

    <div class="main-content">
        <!-- Header same as original -->
        <header class="header" role="banner">
            <!-- ... -->
        </header>

        <div class="page-content">
            <div class="container">
                <!-- Hero Banner -->
                <section class="hero-friends">
                    <!-- ... -->
                </section>

                <!-- Search Section -->
                <section class="search-section">
                    <!-- ... -->
                </section>

                <!-- Tabs -->
                <section class="friends-tabs">
                    <div class="container">
                        <div id="friendsToast" class="toast" role="alert">
                            <i class="fas fa-circle-exclamation"></i>
                            <span id="toastMessage">Action completed</span>
                        </div>

                        <ul class="tab-list" role="tablist">
                            <li><button class="tab-btn active" data-tab="all">All Friends</button></li>
                            <li><button class="tab-btn" data-tab="online">Online</button></li>
                            <li><button class="tab-btn" data-tab="pending">Pending Requests</button></li>
                            <li><button class="tab-btn" data-tab="sent">Sent Requests</button></li>
                            <li><button class="tab-btn" data-tab="blocked">Blocked</button></li>
                            <li><button class="tab-btn" data-tab="suggestions">Suggestions</button></li>
                        </ul>

                        <!-- All Friends Tab -->
                        <div class="tab-content active" id="tab-all">
                            <div class="section-header">
                                <div>
                                    <span class="section-tag"><i class="fas fa-users"></i> Connections</span>
                                    <h2 class="section-title">All Friends</h2>
                                </div>
                                <span style="color:var(--text-muted); font-size:var(--font-size-sm);" id="friendCount">0 friends</span>
                            </div>
                            <div class="friends-grid" id="allFriendsGrid">
                                <!-- Loaded by JS -->
                            </div>
                        </div>

                        <!-- Online Tab -->
                        <div class="tab-content" id="tab-online">
                            <!-- Similar structure -->
                            <div class="friends-grid" id="onlineFriendsGrid"></div>
                        </div>

                        <!-- Pending Requests -->
                        <div class="tab-content" id="tab-pending">
                            <div id="pendingRequestsContainer"></div>
                        </div>

                        <!-- Sent Requests -->
                        <div class="tab-content" id="tab-sent">
                            <div id="sentRequestsContainer"></div>
                        </div>

                        <!-- Blocked -->
                        <div class="tab-content" id="tab-blocked">
                            <div class="friends-grid" id="blockedGrid">
                                <div class="empty-state">
                                    <i class="fas fa-ban"></i>
                                    <h3>No blocked users</h3>
                                </div>
                            </div>
                        </div>

                        <!-- Suggestions -->
                        <div class="tab-content" id="tab-suggestions">
                            <div class="friends-grid" id="suggestionsGrid">
                                <div class="empty-state">
                                    <i class="fas fa-users"></i>
                                    <h3>No suggestions yet</h3>
                                    <button class="btn btn-secondary" id="refreshSuggestions">Refresh Suggestions</button>
                                </div>
                            </div>
                        </div>

                    </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ============================================================
            // AUTH STATE
            // ============================================================
            let currentUser = null;
            let currentProfile = null;

            // ============================================================
            // UPDATE AUTH UI
            // ============================================================
            async function updateAuthUI() {
                try {
                    if (typeof window.AniVerse === 'undefined') {
                        setTimeout(updateAuthUI, 300);
                        return;
                    }
                    const { user, profile } = await window.AniVerse.auth.getCurrentUser();
                    currentUser = user;
                    currentProfile = profile;

                    const isLoggedIn = !!(user && profile);

                    // Sidebar
                    const loginLink = document.getElementById('loginLink');
                    const signupLink = document.getElementById('signupLink');
                    const profileLink = document.getElementById('profileLink');
                    const settingsLink = document.getElementById('settingsLink');
                    const logoutLink = document.getElementById('logoutLink');
                    const adminPanelLink = document.getElementById('adminPanelLink');

                    // Header
                    const headerAvatar = document.getElementById('headerAvatar');
                    const headerLevel = document.getElementById('headerLevel');
                    const headerLoginBtn = document.getElementById('headerLoginBtn');
                    const headerSignupBtn = document.getElementById('headerSignupBtn');

                    if (isLoggedIn) {
                        const displayName = profile?.display_name || user.email || 'User';

                        loginLink.style.display = 'none';
                        signupLink.style.display = 'none';
                        profileLink.style.display = 'flex';
                        settingsLink.style.display = 'flex';
                        logoutLink.style.display = 'flex';

                        if (headerAvatar) {
                            headerAvatar.classList.add('visible');
                            headerAvatar.textContent = displayName.charAt(0).toUpperCase();
                            if (profile?.avatar_url) {
                                headerAvatar.style.backgroundImage = `url(${profile.avatar_url})`;
                                headerAvatar.style.backgroundSize = 'cover';
                                headerAvatar.style.backgroundPosition = 'center';
                                headerAvatar.textContent = '';
                            }
                        }
                        if (headerLevel) {
                            headerLevel.classList.add('visible');
                            headerLevel.textContent = `Lv.${profile?.level || 0}`;
                        }
                        if (headerLoginBtn) headerLoginBtn.classList.remove('visible');
                        if (headerSignupBtn) headerSignupBtn.classList.remove('visible');

                        if (adminPanelLink) {
                            const role = user.user_metadata?.role;
                            if (role === 'admin' || role === 'moderator') {
                                adminPanelLink.classList.add('visible');
                            } else {
                                adminPanelLink.classList.remove('visible');
                            }
                        }

                        // Load friends data
                        await loadAllFriends(user.id);
                        await loadPendingRequests(user.id);
                        await loadSentRequests(user.id);

                    } else {
                        loginLink.style.display = 'flex';
                        signupLink.style.display = 'flex';
                        profileLink.style.display = 'none';
                        settingsLink.style.display = 'none';
                        logoutLink.style.display = 'none';
                        if (headerAvatar) headerAvatar.classList.remove('visible');
                        if (headerLevel) headerLevel.classList.remove('visible');
                        if (headerLoginBtn) headerLoginBtn.classList.add('visible');
                        if (headerSignupBtn) headerSignupBtn.classList.add('visible');
                        if (adminPanelLink) adminPanelLink.classList.remove('visible');

                        document.getElementById('allFriendsGrid').innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-user-lock"></i>
                                <h3>Login Required</h3>
                                <p>Please log in to see your friends.</p>
                                <a href="login.html" class="btn btn-primary">Log In</a>
                            </div>
                        `;
                        document.getElementById('friendCount').textContent = '0 friends';
                    }
                } catch (error) {
                    console.error('[AniVerse] Auth UI update error:', error);
                }
            }

            // ============================================================
            // SIDEBAR TOGGLE (mobile)
            // ============================================================
            const sidebar = document.getElementById('sidebar');
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebarOverlay = document.getElementById('sidebarOverlay');

            function toggleSidebar() {
                sidebar.classList.toggle('open');
                sidebarOverlay.classList.toggle('active');
                document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';
            }

            if (sidebarToggle) {
                sidebarToggle.addEventListener('click', toggleSidebar);
            }

            if (sidebarOverlay) {
                sidebarOverlay.addEventListener('click', function() {
                    if (sidebar.classList.contains('open')) {
                        toggleSidebar();
                    }
                });
            }

            window.addEventListener('resize', function() {
                if (window.innerWidth > 768 && sidebar.classList.contains('open')) {
                    toggleSidebar();
                }
            });

            document.querySelectorAll('.nav-item').forEach(function(item) {
                item.addEventListener('click', function() {
                    if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
                        toggleSidebar();
                    }
                });
            });

            // ============================================================
            // LOGOUT
            // ============================================================
            document.getElementById('logoutLink').addEventListener('click', async function(e) {
                e.preventDefault();
                if (confirm('Are you sure you want to logout?')) {
                    const { error } = await window.AniVerse.auth.signOut();
                    if (!error) {
                        window.clearSupabaseStorage();
                        window.location.replace('index.html');
                    } else {
                        alert('Logout failed. Please try again.');
                    }
                }
            });

            // ============================================================
            // TOAST
            // ============================================================
            const toast = document.getElementById('friendsToast');
            const toastMsg = document.getElementById('toastMessage');

            function showToast(message, type) {
                toast.className = 'toast show ' + (type || 'success');
                toastMsg.textContent = message;
                clearTimeout(toast._hideTimer);
                toast._hideTimer = setTimeout(function() {
                    toast.classList.remove('show');
                }, 4000);
            }

            // ============================================================
            // TABS
            // ============================================================
            const tabBtns = document.querySelectorAll('.tab-btn');
            const tabContents = {
                all: document.getElementById('tab-all'),
                online: document.getElementById('tab-online'),
                pending: document.getElementById('tab-pending'),
                sent: document.getElementById('tab-sent'),
                blocked: document.getElementById('tab-blocked'),
                suggestions: document.getElementById('tab-suggestions')
            };

            tabBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    const tabId = this.getAttribute('data-tab');

                    tabBtns.forEach(function(b) {
                        b.classList.remove('active');
                        b.setAttribute('aria-selected', 'false');
                    });
                    this.classList.add('active');
                    this.setAttribute('aria-selected', 'true');

                    Object.keys(tabContents).forEach(function(key) {
                        if (tabContents[key]) {
                            tabContents[key].classList.remove('active');
                        }
                    });

                    const targetContent = tabContents[tabId];
                    if (targetContent) {
                        targetContent.classList.add('active');
                        // Reload content if needed
                        if (currentUser) {
                            if (tabId === 'pending') loadPendingRequests(currentUser.id);
                            else if (tabId === 'sent') loadSentRequests(currentUser.id);
                            else if (tabId === 'all') loadAllFriends(currentUser.id);
                            else if (tabId === 'online') loadOnlineFriends(currentUser.id);
                        }
                    }
                });
            });

            // ============================================================
            // LOAD ALL FRIENDS
            // ============================================================
            async function loadAllFriends(userId) {
                try {
                    const { friends, error } = await window.AniVerse.db.getFriends(userId);

                    const grid = document.getElementById('allFriendsGrid');
                    const countEl = document.getElementById('friendCount');

                    if (error || !friends || friends.length === 0) {
                        grid.innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-user-slash"></i>
                                <h3>No friends yet</h3>
                                <p>Start connecting with other community members.</p>
                                <button class="btn btn-primary" id="findFriendsBtn">Find Friends</button>
                            </div>
                        `;
                        countEl.textContent = '0 friends';
                        const findBtn = document.getElementById('findFriendsBtn');
                        if (findBtn) {
                            findBtn.addEventListener('click', () => {
                                document.querySelector('[data-tab="suggestions"]').click();
                            });
                        }
                        return;
                    }

                    countEl.textContent = `${friends.length} friends`;

                    grid.innerHTML = friends.map(friend => {
                        const initial = friend.display_name ? friend.display_name.charAt(0).toUpperCase() : 'U';
                        const avatarHtml = friend.avatar_url ?
                            `<img src="${friend.avatar_url}" alt="${friend.display_name}" />` :
                            initial;
                        const statusClass = friend.is_online ? 'online' : 'offline';

                        return `
                            <div class="friend-card">
                                <div class="friend-avatar">
                                    ${avatarHtml}
                                    <div class="status-dot ${statusClass}"></div>
                                </div>
                                <div class="friend-name">${friend.display_name || 'Unknown User'}</div>
                                <div class="friend-display">@${friend.username || 'unknown'}</div>
                                <div class="friend-level">Level ${friend.level || 0}</div>
                                <div class="friend-actions">
                                    <button class="btn btn-secondary message-btn" data-userid="${friend.id}">
                                        <i class="fas fa-comment"></i> Message
                                    </button>
                                    <button class="btn btn-danger remove-btn" data-userid="${friend.id}">
                                        <i class="fas fa-user-minus"></i> Remove
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('');

                    // Load online friends
                    const onlineFriends = friends.filter(f => f.is_online);
                    const onlineGrid = document.getElementById('onlineFriendsGrid');
                    if (onlineFriends.length === 0) {
                        onlineGrid.innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-user-slash"></i>
                                <h3>No online friends</h3>
                                <p>Your online friends will appear here when they're active.</p>
                            </div>
                        `;
                    } else {
                        onlineGrid.innerHTML = onlineFriends.map(friend => {
                            const initial = friend.display_name ? friend.display_name.charAt(0).toUpperCase() : 'U';
                            const avatarHtml = friend.avatar_url ?
                                `<img src="${friend.avatar_url}" alt="${friend.display_name}" />` :
                                initial;

                            return `
                                <div class="friend-card">
                                    <div class="friend-avatar">
                                        ${avatarHtml}
                                        <div class="status-dot online"></div>
                                    </div>
                                    <div class="friend-name">${friend.display_name || 'Unknown User'}</div>
                                    <div class="friend-display">@${friend.username || 'unknown'}</div>
                                    <div class="friend-level">Level ${friend.level || 0}</div>
                                    <div class="friend-actions">
                                        <button class="btn btn-secondary message-btn" data-userid="${friend.id}">
                                            <i class="fas fa-comment"></i> Message
                                        </button>
                                    </div>
                                </div>
                            `;
                        }).join('');
                    }

                } catch (error) {
                    console.error('[AniVerse] Load friends error:', error);
                }
            }

            // ============================================================
            // LOAD PENDING REQUESTS
            // ============================================================
            async function loadPendingRequests(userId) {
                try {
                    const { requests, error } = await window.AniVerse.db.getFriendRequests(userId, 'received');

                    const container = document.getElementById('pendingRequestsContainer');

                    if (error || !requests || requests.length === 0) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <h3>No pending requests</h3>
                                <p>Friend requests from other users will appear here.</p>
                            </div>
                        `;
                        return;
                    }

                    container.innerHTML = requests.map(req => {
                        const sender = req.sender;
                        const initial = sender?.display_name ? sender.display_name.charAt(0).toUpperCase() : 'U';
                        const avatarHtml = sender?.avatar_url ?
                            `<img src="${sender.avatar_url}" alt="${sender.display_name}" />` :
                            initial;

                        return `
                            <div class="request-card" data-requestid="${req.id}">
                                <div class="req-avatar">${avatarHtml}</div>
                                <div class="req-info">
                                    <div class="req-name">${sender?.display_name || 'Unknown User'}</div>
                                    <div class="req-meta">@${sender?.username || 'unknown'} · wants to be friends</div>
                                </div>
                                <div class="req-actions">
                                    <button class="btn btn-success accept-btn" data-requestid="${req.id}">
                                        <i class="fas fa-check"></i> Accept
                                    </button>
                                    <button class="btn btn-danger decline-btn" data-requestid="${req.id}">
                                        <i class="fas fa-times"></i> Decline
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('');

                } catch (error) {
                    console.error('[AniVerse] Load pending requests error:', error);
                }
            }

            // ============================================================
            // LOAD SENT REQUESTS
            // ============================================================
            async function loadSentRequests(userId) {
                try {
                    const { requests, error } = await window.AniVerse.db.getFriendRequests(userId, 'sent');

                    const container = document.getElementById('sentRequestsContainer');

                    if (error || !requests || requests.length === 0) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-paper-plane"></i>
                                <h3>No sent requests</h3>
                                <p>Your outgoing friend requests will appear here.</p>
                            </div>
                        `;
                        return;
                    }

                    container.innerHTML = requests.map(req => {
                        const receiver = req.receiver;
                        const initial = receiver?.display_name ? receiver.display_name.charAt(0).toUpperCase() : 'U';
                        const avatarHtml = receiver?.avatar_url ?
                            `<img src="${receiver.avatar_url}" alt="${receiver.display_name}" />` :
                            initial;

                        return `
                            <div class="request-card" data-requestid="${req.id}">
                                <div class="req-avatar">${avatarHtml}</div>
                                <div class="req-info">
                                    <div class="req-name">${receiver?.display_name || 'Unknown User'}</div>
                                    <div class="req-meta">@${receiver?.username || 'unknown'} · pending</div>
                                </div>
                                <div class="req-actions">
                                    <button class="btn btn-danger cancel-btn" data-requestid="${req.id}">
                                        <i class="fas fa-times"></i> Cancel Request
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('');

                } catch (error) {
                    console.error('[AniVerse] Load sent requests error:', error);
                }
            }

            // ============================================================
            // ACCEPT / DECLINE / CANCEL
            // ============================================================
            async function acceptFriendRequest(requestId) {
                try {
                    // Use RPC or direct update
                    const { error } = await window.AniVerse.client
                        .from('friend_requests')
                        .update({ status: 'accepted' })
                        .eq('id', requestId);

                    if (error) throw new Error(error.message);

                    // Add to friends table
                    const { data: req, error: fetchError } = await window.AniVerse.client
                        .from('friend_requests')
                        .select('sender_id, receiver_id')
                        .eq('id', requestId)
                        .single();

                    if (fetchError) throw new Error(fetchError.message);

                    await window.AniVerse.client
                        .from('friends')
                        .insert([
                            { user_id: req.sender_id, friend_id: req.receiver_id },
                            { user_id: req.receiver_id, friend_id: req.sender_id }
                        ]);

                    showToast('Friend request accepted!', 'success');
                    await loadAllFriends(currentUser.id);
                    await loadPendingRequests(currentUser.id);

                } catch (error) {
                    console.error('[AniVerse] Accept error:', error);
                    showToast('Could not accept request. Please try again.', 'error');
                }
            }

            async function declineFriendRequest(requestId) {
                try {
                    const { error } = await window.AniVerse.client
                        .from('friend_requests')
                        .update({ status: 'declined' })
                        .eq('id', requestId);

                    if (error) throw new Error(error.message);

                    showToast('Request declined.', '');
                    await loadPendingRequests(currentUser.id);

                } catch (error) {
                    console.error('[AniVerse] Decline error:', error);
                    showToast('Could not decline request.', 'error');
                }
            }

            async function cancelFriendRequest(requestId) {
                try {
                    const { error } = await window.AniVerse.client
                        .from('friend_requests')
                        .update({ status: 'withdrawn' })
                        .eq('id', requestId);

                    if (error) throw new Error(error.message);

                    showToast('Request cancelled.', '');
                    await loadSentRequests(currentUser.id);

                } catch (error) {
                    console.error('[AniVerse] Cancel error:', error);
                    showToast('Could not cancel request.', 'error');
                }
            }

            // ============================================================
            // REMOVE FRIEND
            // ============================================================
            async function removeFriend(friendId) {
                if (!confirm('Are you sure you want to remove this friend?')) return;

                try {
                    const { error } = await window.AniVerse.client
                        .from('friends')
                        .delete()
                        .or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`)
                        .or(`user_id.eq.${friendId},friend_id.eq.${friendId}`);

                    if (error) throw new Error(error.message);

                    showToast('Friend removed.', '');
                    await loadAllFriends(currentUser.id);

                } catch (error) {
                    console.error('[AniVerse] Remove friend error:', error);
                    showToast('Could not remove friend.', 'error');
                }
            }

            // ============================================================
            // EVENT DELEGATION
            // ============================================================
            document.addEventListener('click', async function(e) {
                const target = e.target.closest('button');
                if (!target) return;

                if (target.classList.contains('accept-btn')) {
                    const requestId = target.getAttribute('data-requestid');
                    if (requestId) await acceptFriendRequest(requestId);
                }

                if (target.classList.contains('decline-btn')) {
                    const requestId = target.getAttribute('data-requestid');
                    if (requestId) await declineFriendRequest(requestId);
                }

                if (target.classList.contains('cancel-btn')) {
                    const requestId = target.getAttribute('data-requestid');
                    if (requestId) await cancelFriendRequest(requestId);
                }

                if (target.classList.contains('remove-btn')) {
                    const friendId = target.getAttribute('data-userid');
                    if (friendId) await removeFriend(friendId);
                }

                if (target.classList.contains('message-btn')) {
                    const userId = target.getAttribute('data-userid');
                    if (userId) {
                        window.location.href = `messages.html?user=${userId}`;
                    }
                }
            });

            // ============================================================
            // SEARCH FRIENDS (placeholder)
            // ============================================================
            const searchInput = document.getElementById('friendSearchInput');
            const searchBtn = document.getElementById('searchBtn');
            const clearSearchBtn = document.getElementById('clearSearchBtn');

            if (searchBtn) {
                searchBtn.addEventListener('click', function() {
                    const query = searchInput.value.trim();
                    if (query) {
                        // Simple client-side filter
                        const cards = document.querySelectorAll('#allFriendsGrid .friend-card');
                        cards.forEach(card => {
                            const name = card.querySelector('.friend-name')?.textContent?.toLowerCase() || '';
                            card.style.display = name.includes(query.toLowerCase()) ? '' : 'none';
                        });
                    }
                });
            }

            if (clearSearchBtn) {
                clearSearchBtn.addEventListener('click', function() {
                    searchInput.value = '';
                    document.querySelectorAll('#allFriendsGrid .friend-card').forEach(card => {
                        card.style.display = '';
                    });
                });
            }

            // ============================================================
            // INITIALIZE
            // ============================================================
            async function init() {
                if (typeof window.AniVerse === 'undefined') {
                    setTimeout(init, 300);
                    return;
                }

                await updateAuthUI();

                window.AniVerse.auth.onAuthStateChange(() => {
                    updateAuthUI();
                });
            }

            init();

            console.log('[AniVerse] Friends page ready (Supabase integrated)');

        })();
    </script>

</body>
</html>
